# ============================================================
# FILE: .github/workflows/generate-snake.yml
# WHAT IT DOES:
#   - Runs every day at midnight UTC (and on every push)
#   - Generates an animated SVG snake that eats your
#     GitHub contribution squares
#   - Saves the SVG to the "output" branch so README can display it
# ============================================================

name: "· Contribution Snake ·"

on:
  schedule:
    - cron: "0 0 * * *"     # daily at midnight UTC
  push:
    branches: ["main", "master"]
  workflow_dispatch:         # manual trigger from GitHub UI

permissions:
  contents: write

jobs:
  generate-snake:
    name: "Generate Snake SVG"
    runs-on: ubuntu-latest

    steps:
      - name: "◈ Generate Snake (Dark Theme)"
        uses: Platane/snk/svg-only@v3
        with:
          github_user_name: J0HNTHAN
          outputs: |
            dist/github-contribution-grid-snake.svg
            dist/github-contribution-grid-snake-dark.svg?palette=github-dark

      - name: "◈ Push to Output Branch"
        uses: crazy-max/ghaction-github-pages@v4
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
